name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo. Important once public, when every
# fork PR runs these workflows with the default GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  # Typecheck + build the TypeScript workspace on every OS we ship to. The CLI
  # branches on process.platform for notifications, sound, and service install
  # (notify.ts, sound.ts, service.ts), so we exercise install + build on each
  # runner to catch platform-specific breakage without spinning up a VM.
  build:
    name: build (${{ matrix.os }}, node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22] # 20 = engines.node floor; 22 = current LTS contributors use
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build before typecheck: cli/mcp/relay import @ayo-dev/core's compiled
      # .d.ts, which doesn't exist in a clean checkout until core is built.
      # `pnpm -r build` runs topologically (core first), so this resolves it.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      # The relay runs in Workers and must never import @ayo-dev/core/node
      # (node:fs / node:child_process). The typechecker won't catch it (the
      # subpath's d.ts is node-type-free) and nodejs_compat erodes the
      # fails-at-deploy backstop, so enforce the convention here.
      - name: Relay must not import @ayo-dev/core/node
        if: matrix.os == 'ubuntu-latest'
        run: |
          if git grep -n "core/node" -- packages/relay/src; then
            echo "::error::packages/relay must not import @ayo-dev/core/node (Workers bundle)"
            exit 1
          fi

  # Verify the native macOS notifier still compiles. The full build-notifier.sh
  # also signs/notarizes (needs a cert we don't have in CI), so here we only
  # compile main.swift unsigned — that's enough to catch source regressions.
  swift:
    name: swift compile (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile AyoNotifier (unsigned)
        run: |
          swiftc -O packages/cli/native/macos/AyoNotifier/main.swift \
            -o "${RUNNER_TEMP}/AyoNotifier" \
            -framework Foundation \
            -framework UserNotifications \
            -framework AppKit
